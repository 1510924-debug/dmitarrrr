<!DOCTYPE html>
<html>
<head>
<title>KK Partizan</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container">

<h1>KK Partizan</h1>
<p>neka aplikacija</p>

<button class="btn btn-primary" onclick="show('ekipa')">Ekipa</button>
<button class="btn btn-success" onclick="show('tabela')">Tabela</button>
<button class="btn btn-warning" onclick="show('aba')">ABA</button>
<button class="btn btn-danger" onclick="show('stat')">Stat</button>

<hr>

<div id="ekipa">
<h2>Ekipa</h2>
<p>Punter</p>
<p>LeDay</p>
<p>Nunnally</p>
</div>

<div id="tabela" style="display:none;">
<h2>Tabela</h2>
<p>1. Real</p>
<p>2. Barca</p>
<p>3. Oly</p>
<p>4. Partizan</p>
</div>

<div id="aba" style="display:none;">
<h2>ABA</h2>
<p>1. Partizan</p>
<p>2. Zvezda</p>
<p>3. Buducnost</p>
</div>

<div id="stat" style="display:none;">
<h2>Statistika</h2>
<p>Punter 15</p>
<p>LeDay 13</p>
</div>

</div>

<script>
function show(x) {
  document.getElementById('ekipa').style.display='none';
  document.getElementById('tabela').style.display='none';
  document.getElementById('aba').style.display='none';
  document.getElementById('stat').style.display='none';
  document.getElementById(x).style.display='block';
}
</script>

</body>
</html>
